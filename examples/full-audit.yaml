domain: https://example.com
brand:
  name: Example
  aliases:
    - Example AI
  description: AI-powered remote job matching platform
business:
  type: saas
  primary_conversion: signup
  secondary_conversions:
    - resume_upload
    - subscription
target:
  countries:
    - US
  languages:
    - en
  users:
    - remote job seekers
    - AI engineers
queries:
