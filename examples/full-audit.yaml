    intent: commercial
    country: US
    language: en
    priority: high
competitors:
  - remoteok.com
  - weworkremotely.com
crawl:
  max_pages: 200
  render_javascript: true
  obey_robots: true
integrations:
  gsc: optional
  ga4: optional
  pagespeed: optional
  searchstack: optional
  geo_optimizer: optional
  seomator: optional
  dataforseo: optional
  ai_providers: optional

